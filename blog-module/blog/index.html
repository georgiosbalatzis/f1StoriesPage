<!-- Page-specific: blog loader + author filtering -->
<script>
document.addEventListener('DOMContentLoaded', function() {

    var allPosts = [];
    var activeAuthor = 'all';
    var grid = document.getElementById('articles-grid');
    var countEl = document.getElementById('post-count');

    function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function renderCard(post, idx) {
        var cats = (post.categories || []).slice(0, 2).map(function(c) { return '<span class="article-card-cat">' + escHtml(c) + '</span>'; }).join('');
        var url = post.url || ('/blog-module/blog-entries/' + post.id + '/article.html');
        var img = post.image || '/blog-module/images/default-blog.jpg';
        var date = post.displayDate || post.date || '';
        var author = post.author || 'F1 Stories';
        var excerpt = post.excerpt || '';
        var readMins = post.readingTime || post.readTime || '';
        if (!readMins && post.wordCount) { readMins = Math.max(1, Math.ceil(post.wordCount / 200)) + ' min'; }
        if (!readMins && excerpt) { readMins = Math.max(2, Math.ceil(Math.round(excerpt.split(/\s+/).length * 10) / 200)) + ' min'; }
        var readBadge = readMins ? '<span>\u00b7</span><span class="article-card-reading-time"><i class="fas fa-clock"></i> ' + escHtml(readMins) + '</span>' : '';

        return '<a href="' + escHtml(url) + '" class="article-card" style="animation-delay:' + (idx * 0.06) + 's">'
            + '<div class="article-card-img-wrap"><img class="article-card-img" data-src="' + escHtml(img) + '" alt="' + escHtml(post.title) + '" onerror="this.src=\'/blog-module/images/default-blog.jpg\';this.onerror=null;"></div>'
            + '<div class="article-card-body">'
            + '<div class="article-card-meta"><span class="author-tag">' + escHtml(author) + '</span><span>\u00b7</span><span>' + escHtml(date) + '</span>' + readBadge + '</div>'
            + '<h3 class="article-card-title">' + escHtml(post.title) + '</h3>'
            + '<p class="article-card-excerpt">' + escHtml(excerpt) + '</p>'
            + '</div>'
            + '<div class="article-card-footer"><span class="article-card-read">Read more <i class="fas fa-arrow-right"></i></span><div class="article-card-cats">' + cats + '</div></div>'
            + '</a>';
    }

    function lazyLoadImages() {
        if (!grid) return;
        var imgs = grid.querySelectorAll('img[data-src]');
        if (!imgs.length) return;
        function loadImg(img) {
            var src = img.getAttribute('data-src');
            if (!src) return;
            img.src = src; img.removeAttribute('data-src');
            img.addEventListener('load', function() { img.classList.add('loaded'); }, { once: true });
            img.addEventListener('error', function() { img.classList.add('loaded'); }, { once: true });
            if (img.complete && img.naturalWidth > 0) img.classList.add('loaded');
            setTimeout(function() { img.classList.add('loaded'); }, 1500);
        }
        if ('IntersectionObserver' in window) {
            var observer = new IntersectionObserver(function(entries) { entries.forEach(function(entry) { if (entry.isIntersecting) { loadImg(entry.target); observer.unobserve(entry.target); } }); }, { rootMargin: '300px 0px' });
            imgs.forEach(function(img) { observer.observe(img); });
        } else { imgs.forEach(loadImg); }
    }

    function renderPosts() {
        if (!grid) return;
        var filtered = activeAuthor === 'all' ? allPosts : allPosts.filter(function(p) { return p.author === activeAuthor; });
        if (countEl) { countEl.textContent = filtered.length + ' post' + (filtered.length !== 1 ? 's' : '') + (activeAuthor !== 'all' ? ' by ' + activeAuthor : ''); }
        if (!filtered.length) { grid.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><p>No posts found' + (activeAuthor !== 'all' ? ' by this author' : '') + '.</p></div>'; return; }
        grid.innerHTML = filtered.map(function(p, i) { return renderCard(p, i); }).join('');
        lazyLoadImages();
    }

    window.__blogFilterByAuthor = function(author) {
        activeAuthor = author;
        renderPosts();
    };

    function tryFetch(paths, idx) {
        if (idx >= paths.length) { if (grid) grid.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Could not load blog posts.</p></div>'; return; }
        fetch(paths[idx]).then(function(r) { if (!r.ok) throw new Error('not ok'); return r.json(); }).then(function(data) {
            allPosts = (data.posts || data || []).sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
            renderPosts();
        }).catch(function() { tryFetch(paths, idx + 1); });
    }

    tryFetch(['/blog-module/blog-data.json', '../blog-data.json', '../../blog-data.json'], 0);

    var strip = document.getElementById('author-strip');
    if (strip) {
        var lastChipTap = 0;
        function handleChipActivate(e) {
            var now = Date.now();
            if (now - lastChipTap < 300) return;
            lastChipTap = now;
            var chip = e.target.closest('.author-chip');
            if (!chip) return;
            e.preventDefault();
            strip.querySelectorAll('.author-chip').forEach(function(c) { c.classList.remove('active'); });
            chip.classList.add('active');
            activeAuthor = chip.getAttribute('data-author');
            renderPosts();
        }
        strip.addEventListener('touchend', handleChipActivate, { passive: false });
        strip.addEventListener('click', handleChipActivate);
    }
});
</script>
