name: Site Quality

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build public artifact
        run: npm run build:public

      - name: Run static source guard
        run: npm run quality:static

      - name: Audit runtime dependencies
        run: npm run audit:runtime

      - name: Run author module tests
        run: npm run test:author

      - name: Run standings module tests
        run: npm run test:standings
