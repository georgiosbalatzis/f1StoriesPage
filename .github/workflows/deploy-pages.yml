name: Deploy Pages

on:
  workflow_call:
  push:
    branches: [main]
    paths-ignore:
      - 'blog-module/blog-entries/**'
      - 'blog-module/blog-processor.js'
      - 'blog-module/blog/template.html'
      - 'blog-module/dirty-air-cache.js'
      - 'blog-module/destructors-cache.js'
      - 'standings/debrief-cache.js'
      - 'standings/debrief-cache.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish-blog.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  queue: max

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build public artifact
        run: npm run build:public

      - name: Run static source guard
        run: npm run quality:static

      - name: Audit runtime dependencies
        run: npm run audit:runtime

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy Pages artifact
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
