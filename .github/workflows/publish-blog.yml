name: Publish Blog

# Runs the blog-processor whenever a new or modified article source lands on main,
# then commits the generated article.html, feed JSONs, and sitemap back to the branch.
# Commits made by GITHUB_TOKEN do not re-trigger workflows, so there is no loop.

on:
  push:
    branches: [main]
    paths:
      - 'blog-module/blog-entries/**'
      - 'blog-module/blog-processor.js'
      - 'blog-module/blog/template.html'
      - 'blog-module/dirty-air-cache.js'
      - 'blog-module/destructors-cache.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish-blog.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-blog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run blog processor
        run: node blog-module/blog-processor.js

      - name: Commit generated artifacts
        run: |
          git config user.name  "f1stories-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced by blog-processor — nothing to commit."
            exit 0
          fi
          git commit -m "chore(blog): auto-build generated artifacts [skip ci]"
          git push
