name: Site Maintenance

# Owns generated content maintenance: blog artifacts, standings data, and the YouTube snapshot.
# Scheduled jobs are split by cron through job-level conditions. Push events
# only run the blog publisher for article/build-source changes.

on:
  schedule:
    - cron: '17 5,17 * * *'
    - cron: '17 0,12 * * *'
    # Standings refresh: Friday 23:59 and Saturday 07:01 Europe/Athens.
    # GitHub cron is UTC, so both EET and EEST offsets are scheduled and
    # the job gates them against the local Athens time window.
    - cron: '59 20 * * 5'
    - cron: '59 21 * * 5'
    - cron: '1 4 * * 6'
    - cron: '1 5 * * 6'
  push:
    branches: [main]
    paths:
      - 'blog-module/blog-entries/**'
      - 'blog-module/blog-processor.js'
      - 'blog-module/build/**'
      - 'src/pages/blog-module/blog/template.html'
      - 'blog-module/dirty-air-cache.js'
      - 'blog-module/destructors-cache.js'
      - 'standings/debrief-cache.js'
      - 'standings/debrief-cache.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish-blog.yml'
  workflow_dispatch:
    inputs:
      task:
        description: 'Maintenance task to run'
        required: true
        default: 'blog'
        type: choice
        options:
          - blog
          - standings
          - youtube

permissions:
  contents: write

jobs:
  publish_blog:
    name: Publish blog artifacts
    if: >-
      ${{
        github.event_name == 'push' ||
        (github.event_name == 'schedule' && github.event.schedule == '17 5,17 * * *') ||
        (github.event_name == 'workflow_dispatch' && inputs.task == 'blog')
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: publish-blog
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run blog processor
        run: node blog-module/blog-processor.js

      - name: Commit generated artifacts
        run: |
          set -eu
          git config user.name  "Georgios Balatzis"
          git config user.email "georgios.balatzis@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced by blog-processor — nothing to commit."
            exit 0
          fi

          git commit -m "chore(blog): auto-build generated artifacts [skip ci]"
          git push

  refresh_youtube:
    name: Refresh YouTube snapshot
    if: >-
      ${{
        (github.event_name == 'schedule' && github.event.schedule == '17 0,12 * * *') ||
        (github.event_name == 'workflow_dispatch' && inputs.task == 'youtube')
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: youtube-refresh
      cancel-in-progress: false
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Refresh YouTube snapshot
        run: node scripts/build/fetch-youtube.mjs

      - name: Commit updated snapshot
        run: |
          set -eu
          git add assets/youtube-latest.json
          if git diff --cached --quiet; then
            echo "No YouTube snapshot changes."
            exit 0
          fi

          git config user.name  "Georgios Balatzis"
          git config user.email "georgios.balatzis@gmail.com"
          git commit -m "chore(data): refresh youtube snapshot [skip ci]"
          git push origin HEAD:main

  refresh_standings_data:
    name: Refresh standings data
    if: >-
      ${{
        (github.event_name == 'schedule' && (
          github.event.schedule == '59 20 * * 5' ||
          github.event.schedule == '59 21 * * 5' ||
          github.event.schedule == '1 4 * * 6' ||
          github.event.schedule == '1 5 * * 6'
        )) ||
        (github.event_name == 'workflow_dispatch' && inputs.task == 'standings')
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: standings-data-refresh
      cancel-in-progress: false
    steps:
      - name: Check Athens schedule window
        id: schedule_window
        if: ${{ github.event_name == 'schedule' }}
        shell: bash
        run: |
          set -eu
          read -r weekday hour minute <<< "$(TZ=Europe/Athens date +'%u %H %M')"
          minute_num=$((10#$minute))
          should_run=false

          if [ "$weekday" = "5" ] && [ "$hour" = "23" ] && [ "$minute_num" -ge 50 ]; then
            should_run=true
          fi
          if [ "$weekday" = "6" ] && [ "$hour" = "00" ] && [ "$minute_num" -le 45 ]; then
            should_run=true
          fi
          if [ "$weekday" = "6" ] && [ "$hour" = "07" ] && [ "$minute_num" -le 45 ]; then
            should_run=true
          fi

          echo "Athens time: weekday=$weekday hour=$hour minute=$minute"
          echo "run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        run: npm ci --no-audit --no-fund

      - name: Refresh standings data
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        run: npm run build:standings-data

      - name: Commit updated standings data
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        run: |
          set -eu
          git add \
            standings/standings-cache.json \
            standings/dirty-air-cache.json \
            standings/destructors-cache.json \
            standings/debrief-cache.json
          if git diff --cached --quiet; then
            echo "No standings data changes."
            exit 0
          fi

          git config user.name  "Georgios Balatzis"
          git config user.email "georgios.balatzis@gmail.com"
          git commit -m "chore(data): refresh standings snapshots [skip ci]"
          git push origin HEAD:main
