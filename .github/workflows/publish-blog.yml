name: Site Maintenance

# Owns generated content maintenance: blog artifacts, standings data, and the YouTube snapshot.
# Scheduled jobs are split by cron through job-level conditions. Push events
# only run the blog publisher for article/build-source changes.

on:
  schedule:
    - cron: '17 5,17 * * *'
    - cron: '17 0,12 * * *'
    # Standings refresh: Friday 23:59 and Saturday 07:01 Europe/Athens.
    # GitHub cron is UTC, so both EET and EEST offsets are scheduled and
    # the job gates them against the local Athens time window.
    - cron: '59 20 * * 5'
    - cron: '59 21 * * 5'
    - cron: '1 4 * * 6'
    - cron: '1 5 * * 6'
  push:
    branches: [main]
    paths:
      - 'blog-module/blog-entries/**'
      - 'blog-module/blog-processor.js'
      - 'blog-module/blog/template.html'
      - 'blog-module/dirty-air-cache.js'
      - 'blog-module/destructors-cache.js'
      - 'standings/debrief-cache.js'
      - 'standings/debrief-cache.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/publish-blog.yml'
  workflow_dispatch:
    inputs:
      task:
        description: 'Maintenance task to run'
        required: true
        default: 'blog'
        type: choice
        options:
          - blog
          - standings
          - youtube

permissions:
  contents: write

jobs:
  publish_blog:
    name: Publish blog artifacts
    if: >-
      ${{
        github.event_name == 'push' ||
        (github.event_name == 'schedule' && github.event.schedule == '17 5,17 * * *') ||
        (github.event_name == 'workflow_dispatch' && inputs.task == 'blog')
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: content-publishing
      queue: max
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Restore git mtimes for blog entries
        # actions/checkout sets every file's mtime to the checkout time, so the
        # blog processor's mtime-based skip check can't tell that source.txt was
        # edited in a later commit than article.html — and silently skips the
        # rebuild. Restore each tracked file's mtime to the latest commit that
        # touched it so the skip check matches local-dev behaviour.
        run: |
          set -eu
          git log --pretty=tformat:'@%at' --name-only -- 'blog-module/blog-entries/' \
            | awk '
                /^@[0-9]+$/ { ts = substr($0, 2); next }
                NF == 0 { next }
                !seen[$0]++ { printf "%s\t%s\n", ts, $0 }
              ' \
            | while IFS=$'\t' read -r ts file; do
                # `git log` includes deleted/renamed files; skip them.
                # An `if` is used (not `&& touch`) so the loop body returns 0
                # even when the file is missing — otherwise the whole `while`
                # exits non-zero on the last skipped iteration and `set -e`
                # aborts the step.
                if [ -e "$file" ]; then
                  touch -m -d "@$ts" "$file"
                fi
              done

      - name: Run blog processor
        run: node blog-module/blog-processor.js

      - name: Commit generated artifacts
        id: commit
        run: |
          set -eu
          echo "changed=false" >> "$GITHUB_OUTPUT"
          git config user.name  "Georgios Balatzis"
          git config user.email "georgios.balatzis@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes produced by blog-processor — nothing to commit."
            exit 0
          fi

          git commit -m "chore(blog): auto-build generated artifacts [skip ci]"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  refresh_youtube:
    name: Refresh YouTube snapshot
    if: >-
      ${{
        (github.event_name == 'schedule' && github.event.schedule == '17 0,12 * * *') ||
        (github.event_name == 'workflow_dispatch' && inputs.task == 'youtube')
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: content-publishing
      queue: max
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Refresh YouTube snapshot
        run: node scripts/build/fetch-youtube.mjs

      - name: Commit updated snapshot
        id: commit
        run: |
          set -eu
          echo "changed=false" >> "$GITHUB_OUTPUT"
          git add assets/youtube-latest.json
          if git diff --cached --quiet; then
            echo "No YouTube snapshot changes."
            exit 0
          fi

          git config user.name  "Georgios Balatzis"
          git config user.email "georgios.balatzis@gmail.com"
          git commit -m "chore(data): refresh youtube snapshot [skip ci]"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

  refresh_standings_data:
    name: Refresh standings data
    if: >-
      ${{
        (github.event_name == 'schedule' && (
          github.event.schedule == '59 20 * * 5' ||
          github.event.schedule == '59 21 * * 5' ||
          github.event.schedule == '1 4 * * 6' ||
          github.event.schedule == '1 5 * * 6'
        )) ||
        (github.event_name == 'workflow_dispatch' && inputs.task == 'standings')
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: content-publishing
      queue: max
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Check Athens schedule window
        id: schedule_window
        if: ${{ github.event_name == 'schedule' }}
        shell: bash
        run: |
          set -eu
          read -r weekday hour minute <<< "$(TZ=Europe/Athens date +'%u %H %M')"
          minute_num=$((10#$minute))
          should_run=false

          if [ "$weekday" = "5" ] && [ "$hour" = "23" ] && [ "$minute_num" -ge 50 ]; then
            should_run=true
          fi
          if [ "$weekday" = "6" ] && [ "$hour" = "00" ] && [ "$minute_num" -le 45 ]; then
            should_run=true
          fi
          if [ "$weekday" = "6" ] && [ "$hour" = "07" ] && [ "$minute_num" -le 45 ]; then
            should_run=true
          fi

          echo "Athens time: weekday=$weekday hour=$hour minute=$minute"
          echo "run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        run: npm ci --no-audit --no-fund

      - name: Refresh standings data
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        run: npm run build:standings-data

      - name: Commit updated standings data
        id: commit
        if: ${{ github.event_name != 'schedule' || steps.schedule_window.outputs.run == 'true' }}
        run: |
          set -eu
          echo "changed=false" >> "$GITHUB_OUTPUT"
          git add \
            standings/standings-cache.json \
            standings/dirty-air-cache.json \
            standings/destructors-cache.json \
            standings/debrief-cache.json
          if git diff --cached --quiet; then
            echo "No standings data changes."
            exit 0
          fi

          git config user.name  "Georgios Balatzis"
          git config user.email "georgios.balatzis@gmail.com"
          git commit -m "chore(data): refresh standings snapshots [skip ci]"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy changed maintenance content
    needs: [publish_blog, refresh_youtube, refresh_standings_data]
    if: >-
      ${{
        always() &&
        (
          (needs.publish_blog.result == 'success' && needs.publish_blog.outputs.changed == 'true') ||
          (needs.refresh_youtube.result == 'success' && needs.refresh_youtube.outputs.changed == 'true') ||
          (needs.refresh_standings_data.result == 'success' && needs.refresh_standings_data.outputs.changed == 'true')
        )
      }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-pages.yml
