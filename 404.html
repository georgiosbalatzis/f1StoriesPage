<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>F1 Stories — Offline</title>
  <script src="/scripts/perf/error-beacon.min.js?v=ea43d064"></script>
  <style>
    :root { --bg: #111113; --surface: #161618; --accent: #3b82f6; --text: #e5e5e7; --sub: #a1a1a6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100svh; text-align: center; padding: 2rem; }
    .card { background: var(--surface); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 3rem 2rem; max-width: 360px; width: 100%; }
    img { width: 64px; height: 64px; margin-bottom: 1.5rem; border-radius: 12px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: .5rem; }
    p { font-size: .95rem; color: var(--sub); line-height: 1.6; margin-bottom: 1.75rem; }
    a { display: inline-block; background: var(--accent); color: #fff; text-decoration: none; padding: .7rem 1.75rem; border-radius: 8px; font-weight: 600; font-size: .9rem; }
    a:active { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/images/logo-256.webp" alt="F1 Stories" width="256" height="256" decoding="async">
    <h1>Δεν υπάρχει σύνδεση</h1>
    <p>Φαίνεται ότι είσαι offline. Ελέγξτε τη σύνδεσή σας και δοκιμάστε ξανά.</p>
    <a href="/" onclick="location.reload(); return false;">Δοκιμή ξανά</a>
  </div>
</body>
</html>
