<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>F1 Stories - Η σελίδα δεν βρέθηκε</title>
  <script src="/scripts/perf/error-beacon.min.js?v=59367e85"></script>
  <script src="/scripts/theme-init.min.js?v=718dd2ec"></script>
  <style>
    :root {
      --bg: #111113;
      --surface: #1c1c1e;
      --accent: #41B6E6;
      --accent-text: #071014;
      --text: #e5e5e7;
      --sub: #a1a1a6;
      --border: rgba(255,255,255,.08);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f7;
        --surface: #fff;
        --text: #1d1d1f;
        --sub: #6e6e73;
        --border: rgba(0,0,0,.08);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem calc(2rem + env(safe-area-inset-bottom, 0));
      text-align: center;
    }
    .not-found-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2rem;
    }
    img {
      width: 64px;
      height: 64px;
      margin-bottom: 1.2rem;
      border-radius: 14px;
    }
    .status {
      color: var(--accent);
      font-size: .8rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: .65rem;
    }
    h1 {
      font-size: clamp(1.45rem, 5vw, 1.9rem);
      line-height: 1.15;
      margin-bottom: .75rem;
    }
    .sub {
      color: var(--sub);
      font-size: .96rem;
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: .7rem;
    }
    a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      padding: .68rem 1.1rem;
      font-size: .9rem;
      font-weight: 700;
      text-decoration: none;
    }
    .primary {
      background: var(--accent);
      color: var(--accent-text);
    }
    .secondary {
      color: var(--text);
      border: 1px solid var(--border);
      background: transparent;
    }
    a:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main class="not-found-card" aria-labelledby="page-title">
    <img src="/images/logo-256.webp" alt="F1 Stories" width="256" height="256" decoding="async">
    <p class="status">404</p>
    <h1 id="page-title">Η σελίδα δεν βρέθηκε</h1>
    <p class="sub">Ο σύνδεσμος μπορεί να άλλαξε ή να μην υπάρχει πια. Γύρνα στην αρχική ή συνέχισε από το blog.</p>
    <div class="actions">
      <a class="primary" href="/">Αρχική</a>
      <a class="secondary" href="/blog-module/blog/index.html">Blog</a>
    </div>
  </main>
</body>
</html>
